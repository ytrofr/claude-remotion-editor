<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dorian — Scene 2C HomeScroll (dotlottie-player cursor)</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@dotlottie/player-component@2.7.12/dist/dotlottie-player.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #fff;
        font-family: "Rubik", sans-serif;
      }
      #stage {
        width: 1080px;
        height: 1920px;
        background: #fff;
        position: relative;
      }
      .scene-title {
        position: absolute;
        top: 80px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 48px;
        font-weight: 700;
        color: #1e293b;
        z-index: 10;
        opacity: 0;
      }

      .phone-wrap {
        position: absolute;
        left: 540px;
        top: 960px;
        transform: translate(-50%, -50%) scale(1.8);
        transform-origin: center center;
      }
      .phone-bezel {
        width: 414px;
        height: 868px;
        background: #1a1a1a;
        border-radius: 55px;
        padding: 12px;
        box-shadow:
          0 50px 100px rgba(0, 0, 0, 0.4),
          0 20px 40px rgba(0, 0, 0, 0.3);
      }
      .phone-screen {
        width: 390px;
        height: 844px;
        border-radius: 45px;
        overflow: hidden;
        position: relative;
        background: #fff;
      }
      .scroll-inner {
        position: absolute;
        top: 0;
        left: 0;
        width: 390px;
        will-change: transform;
      }
      .screen-1 {
        position: relative;
        margin-left: -5px;
      }
      .screen-1 img {
        width: 442px;
        height: auto;
        display: block;
      }
      .screen-1 .bottom-mask {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 55px;
        background: #fff;
      }
      .screen-2 {
        position: relative;
        margin-left: -5px;
        margin-top: -70px;
      }
      .screen-2 img {
        width: 402px;
        height: auto;
        display: block;
      }
      .screen-2 .top-mask {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        background: #fff;
      }

      .sticky-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 148px;
        z-index: 20;
        background: #fff;
      }
      .status-bar {
        height: 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 28px;
        font-size: 17px;
        font-weight: 600;
        color: #000;
      }
      .dynamic-island {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 32px;
        background: #000;
        border-radius: 20px;
        z-index: 25;
      }
      .nav-header {
        height: 98px;
        padding: 10px 16px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .nav-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .hamburger {
        width: 24px;
        height: 18px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .hamburger span {
        height: 2.5px;
        background: #1e293b;
        border-radius: 2px;
      }
      .hamburger span:nth-child(1) {
        width: 24px;
      }
      .hamburger span:nth-child(2) {
        width: 20px;
      }
      .hamburger span:nth-child(3) {
        width: 16px;
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav-logo-icon {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .nav-logo-icon::after {
        content: "";
        width: 11px;
        height: 11px;
        border-radius: 50%;
        border: 2px solid #fff;
        border-right-color: transparent;
        transform: rotate(-45deg);
      }
      .nav-logo-text {
        font-size: 18px;
        font-weight: 800;
        color: #1e293b;
        letter-spacing: 1px;
      }
      .nav-account {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1.5px solid #1e293b;
        position: relative;
      }
      .nav-account::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 30%;
        transform: translateX(-50%);
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #1e293b;
      }
      .search-bar {
        height: 40px;
        background: #f1f5f9;
        border-radius: 12px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #64748b;
        font-size: 14px;
      }

      .ai-bubble {
        position: absolute;
        bottom: 70px;
        right: 15px;
        z-index: 20;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 20px rgba(45, 212, 191, 0.4);
      }
      .ai-bubble::before {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 2px solid #2dd4bf;
        opacity: 0.5;
        animation: pulse 2s ease-out infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 0.5;
        }
        100% {
          transform: scale(1.5);
          opacity: 0;
        }
      }
      .ai-bubble-icon {
        color: #fff;
        font-size: 22px;
        font-weight: 700;
      }
      .home-indicator {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 140px;
        height: 5px;
        background: #000;
        border-radius: 3px;
      }

      /* SVG cursor — viewBox matches Lottie vertex space */
      #cursor {
        position: absolute;
        left: 680px;
        top: 860px;
        width: 200px;
        height: 200px;
        transform-origin: 45px 55px; /* near the cursor tip in viewBox coords */
        z-index: 100;
        pointer-events: none;
        opacity: 0;
      }
      #cursor .lottie-cursor,
      #cursor dotlottie-player {
        width: 100%;
        height: 100%;
        display: block;
        filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.25));
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      class="clip"
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-track-index="0"
      data-width="1080"
      data-height="1920"
    >
      <audio
        id="sfx-swipe"
        src="audio/sfx/whoosh.wav"
        data-start="0.933"
        data-duration="3"
        data-volume="0.3"
        preload="auto"
      ></audio>

      <div class="scene-title" id="title">Discover Local Products</div>

      <div class="phone-wrap">
        <div class="phone-bezel">
          <div class="phone-screen">
            <div class="scroll-inner" id="scroll-inner">
              <div class="screen-1">
                <img src="public/dorian/woodmart/home-mobile.png" alt="" />
                <div class="bottom-mask"></div>
              </div>
              <div class="screen-2">
                <img
                  src="public/dorian/woodmart/categories-mobile-2.png"
                  alt=""
                />
                <div class="top-mask"></div>
              </div>
            </div>

            <div class="sticky-header">
              <div class="dynamic-island"></div>
              <div class="status-bar">
                <span>10:45</span>
                <span
                  style="display: inline-flex; gap: 6px; align-items: center"
                >
                  <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
                    <path
                      d="M1 8h2v3H1zM5 6h2v5H5zM9 4h2v7H9zM13 1h2v10h-2z"
                      fill="#000"
                    />
                  </svg>
                  <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                    <path
                      d="M8 9l2 2a6 6 0 00-4 0l2-2zM8 6l4 4a11 11 0 00-8 0l4-4zM8 3l6 6a16 16 0 00-12 0l6-6z"
                      fill="#000"
                    />
                  </svg>
                  <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
                    <rect
                      x="1"
                      y="1"
                      width="20"
                      height="9"
                      rx="2"
                      stroke="#000"
                      stroke-width="1"
                      fill="#000"
                    />
                    <rect
                      x="22"
                      y="4"
                      width="1.5"
                      height="3"
                      rx="0.5"
                      fill="#000"
                    />
                  </svg>
                </span>
              </div>
              <div class="nav-header">
                <div class="nav-row">
                  <div class="hamburger">
                    <span></span><span></span><span></span>
                  </div>
                  <div class="nav-logo">
                    <div class="nav-logo-icon"></div>
                    <div class="nav-logo-text">DORIAN</div>
                  </div>
                  <div class="nav-account"></div>
                </div>
                <div class="search-bar">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <circle
                      cx="6"
                      cy="6"
                      r="4.5"
                      stroke="#64748b"
                      stroke-width="1.5"
                    />
                    <path
                      d="M9.5 9.5L12.5 12.5"
                      stroke="#64748b"
                      stroke-width="1.5"
                      stroke-linecap="round"
                    />
                  </svg>
                  Search for products
                </div>
              </div>
            </div>

            <div class="ai-bubble">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path
                  d="M12 2l2.5 7L22 11.5l-7.5 2.5L12 22l-2.5-7.5L2 12l7.5-2.5L12 2z"
                  fill="#fff"
                />
              </svg>
            </div>
            <div class="home-indicator"></div>
          </div>
        </div>
      </div>

      <!-- Lottie cursor via dotlottie-player (HF official pattern) -->
      <div id="cursor">
        <dotlottie-player
          class="lottie-cursor"
          src="lottie/cursor-real-black.json"
          autoplay
          speed="0"
        ></dotlottie-player>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Title fade in
      tl.to("#title", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0);

      // Cursor: enter from right, slide to (780,960), tilt during scroll, release
      // (container top-left start 950,860 → target 680,860 — so x goes 270 → 0)
      gsap.set("#cursor", { opacity: 0, x: 270, y: 0, rotation: 0 });
      tl.to("#cursor", { opacity: 1, duration: 0.2 }, 0);
      tl.to("#cursor", { x: 0, duration: 20 / 30, ease: "power2.out" }, 0);

      // Tilt on drag start (f28 → f35), hold through f118
      tl.to(
        "#cursor",
        { rotation: -22, duration: 8 / 30, ease: "back.out(1.5)" },
        20 / 30,
      );

      // Scroll phone content: 0 → -804 over f30 → f120
      tl.to(
        "#scroll-inner",
        { y: -804, duration: 90 / 30, ease: "power2.out" },
        30 / 30,
      );

      // Release tilt at f118 → back to 0
      tl.to(
        "#cursor",
        { rotation: 0, duration: 7 / 30, ease: "power2.out" },
        118 / 30,
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
