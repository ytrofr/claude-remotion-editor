<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dorian — Scene 5 UserTyping (HF Pilot)</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@dotlottie/player-component@2.7.12/dist/dotlottie-player.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="components/dorian-phone.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #fff;
        font-family: "Rubik", sans-serif;
      }
      #stage {
        width: 1080px;
        height: 1920px;
        background: #fff;
        position: relative;
      }

      .title {
        position: absolute;
        top: 80px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 44px;
        font-weight: 700;
        color: #1e293b;
        z-index: 10;
        opacity: 0;
      }
      #phone-stage {
        position: absolute;
        inset: 0;
        transform-origin: center center;
      }
      #phone-mount {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .chat-panel {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 370px;
        background: #fff;
        border-radius: 24px 24px 0 0;
        box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.12);
        padding: 15px 16px;
        z-index: 10;
      }
      .chat-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .chat-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
      }
      .chat-name {
        font-weight: 700;
        font-size: 14px;
        color: #1e293b;
      }
      .chat-sub {
        font-size: 10px;
        color: #2dd4bf;
      }
      .chat-msg {
        background: #f0f0f0;
        padding: 8px 12px;
        border-radius: 14px 14px 14px 4px;
        max-width: 85%;
        font-size: 12px;
        color: #1e293b;
        line-height: 1.3;
        margin-bottom: 8px;
      }
      .user-msg {
        background: #2dd4bf;
        padding: 8px 12px;
        border-radius: 14px 14px 4px 14px;
        max-width: 80%;
        margin-left: auto;
        font-size: 12px;
        color: #fff;
        line-height: 1.3;
        opacity: 0;
      }
      .chat-input {
        position: absolute;
        bottom: 12px;
        left: 12px;
        right: 12px;
        background: #fff;
        border-radius: 18px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 2px solid #2dd4bf;
      }
      .chat-input.sent {
        background: #f5f5f5;
        border-color: transparent;
      }
      .chat-input-text {
        color: #1e293b;
        font-size: 11px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chat-input-text.placeholder {
        color: #999;
      }
      .chat-send {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 14px;
        flex-shrink: 0;
        transform-origin: center center;
      }
      .chat-send.active {
        background: #2dd4bf;
      }

      #cursor {
        position: absolute;
        left: 0;
        top: 0;
        width: 200px;
        height: 200px;
        transform-origin: 45px 55px;
        z-index: 100;
        pointer-events: none;
        opacity: 0;
      }
      #cursor dotlottie-player {
        width: 100%;
        height: 100%;
        display: block;
        filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.25));
      }
      .ripple {
        position: absolute;
        left: 0;
        top: 0;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(45, 212, 191, 0.5);
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
        z-index: 99;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      class="clip"
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-track-index="0"
      data-width="1080"
      data-height="1920"
    >
      <audio
        id="sfx-typing"
        src="audio/typing-soft.wav"
        data-start="0.167"
        data-duration="2.167"
        data-volume="0.3"
        preload="auto"
      ></audio>
      <audio
        id="sfx-send"
        src="audio/send-click.wav"
        data-start="3.5"
        data-duration="0.5"
        data-volume="0.5"
        preload="auto"
      ></audio>

      <div class="title" id="title">Find Exactly What You Need</div>

      <div id="phone-stage">
        <div id="phone-mount"></div>
      </div>

      <div id="ripple" class="ripple"></div>

      <div id="cursor">
        <dotlottie-player
          src="lottie/cursor-real-black.json"
          autoplay
          speed="0"
        ></dotlottie-player>
      </div>
    </div>

    <template id="phone-content">
      <div style="margin-left: -5px; margin-top: -70px; position: relative">
        <img
          src="public/dorian/woodmart/categories-mobile-2.png"
          style="width: 402px; height: auto; display: block"
          alt=""
        />
        <div
          style="
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #fff;
          "
        ></div>
      </div>
    </template>

    <script>
      const phone = buildDorianPhone({
        mountId: "phone-mount",
        contentTemplateId: "phone-content",
        zoom: 1.8,
        showAiBubble: false,
        hideSearch: true,
      });

      // Pre-zoom to scene-4 state
      gsap.set("#phone-stage", { scale: 1.528, y: -374 });

      // Append chat panel (no slide — already visible from scene 4)
      phone.screenEl.insertAdjacentHTML(
        "beforeend",
        `
        <div class="chat-panel">
          <div class="chat-header">
            <div class="chat-avatar"></div>
            <div>
              <div class="chat-name">Dorian</div>
              <div class="chat-sub">Your AI Assistant</div>
            </div>
          </div>
          <div class="chat-msg">Hi! How can I help you today?</div>
          <div class="user-msg" id="user-msg">Show me LG TVs with best reviews</div>
          <div class="chat-input" id="chat-input">
            <span class="chat-input-text" id="typed-text"><span class="placeholder">Type a message...</span></span>
            <div class="chat-send" id="chat-send">→</div>
          </div>
        </div>
      `,
      );

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Title fade in
      tl.to("#title", { opacity: 1, duration: 0.3, ease: "power2.out" }, 0);

      // Typewriter: "Show me LG TVs with best reviews" (33 chars), f5-f70 local
      const MSG = "Show me LG TVs with best reviews";
      const typedEl = document.getElementById("typed-text");
      tl.to(
        { n: 0 },
        {
          n: MSG.length,
          duration: 65 / 30,
          ease: "none",
          onUpdate() {
            const n = Math.floor(this.targets()[0].n);
            typedEl.textContent = n > 0 ? MSG.slice(0, n) : "Type a message...";
            typedEl.classList.toggle("placeholder", n === 0);
          },
        },
        5 / 30,
      );

      // Send button activates after typing
      tl.call(
        () => document.getElementById("chat-send").classList.add("active"),
        null,
        70 / 30,
      );

      // Send button pulse after typing done (subtle)
      tl.to(
        "#chat-send",
        {
          scale: 1.08,
          duration: 0.4,
          yoyo: true,
          repeat: 3,
          ease: "sine.inOut",
        },
        70 / 30,
      );

      // Cursor path — appears at f70, moves to send button, clicks at f105
      const TIP_X = 45,
        TIP_Y = 55;
      const setC = (x, y) => ({ x: x - TIP_X, y: y - TIP_Y });

      gsap.set("#cursor", { opacity: 0, rotation: 0, ...setC(750, 1520) });
      tl.to("#cursor", { opacity: 1, duration: 0.1 }, 70 / 30);
      tl.to(
        "#cursor",
        { ...setC(730, 1500), duration: 15 / 30, ease: "power2.out" },
        70 / 30,
      );
      tl.to(
        "#cursor",
        { ...setC(720, 1490), duration: 15 / 30, ease: "power2.out" },
        85 / 30,
      );

      // Click at f105 (3.5s)
      tl.call(
        () => {
          document.getElementById("chat-input").classList.add("sent");
          document.getElementById("typed-text").innerHTML =
            '<span class="placeholder">Type a message...</span>';
          const msg = document.getElementById("user-msg");
          msg.style.opacity = "1";
          const player = document.querySelector("#cursor dotlottie-player");
          if (player && player.seek) player.seek(35);
        },
        null,
        105 / 30,
      );
      tl.set(
        "#ripple",
        { x: 720 - 60, y: 1490 - 60, scale: 0, opacity: 1 },
        105 / 30,
      );
      tl.to(
        "#ripple",
        { scale: 1.5, opacity: 0, duration: 0.5, ease: "power2.out" },
        105 / 30,
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
