<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dorian — Scene 7 AIResponse (HF Pilot)</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@dotlottie/player-component@2.7.12/dist/dotlottie-player.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="components/dorian-phone.js"></script>
    <style>
      /* prettier-ignore */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      /* prettier-ignore */
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #fff; font-family: 'Rubik', sans-serif; }
      /* prettier-ignore */
      #stage { width: 1080px; height: 1920px; background: #fff; position: relative; }
      /* prettier-ignore */
      .title { position: absolute; top: 80px; left: 0; right: 0; text-align: center; font-size: 44px; font-weight: 700; color: #1e293b; z-index: 10; opacity: 0; }
      /* prettier-ignore */
      #phone-stage { position: absolute; inset: 0; transform-origin: center center; }
      /* prettier-ignore */
      #phone-mount { position: absolute; inset: 0; pointer-events: none; }
      /* prettier-ignore */
      .chat-panel { position: absolute; bottom: 0; left: 0; right: 0; height: 370px; background: #fff; border-radius: 24px 24px 0 0; box-shadow: 0 -8px 30px rgba(0,0,0,0.12); padding: 15px 16px; z-index: 10; }
      /* prettier-ignore */
      .chat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      /* prettier-ignore */
      .chat-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%); }
      /* prettier-ignore */
      .chat-name { font-weight: 700; font-size: 14px; color: #1e293b; }
      /* prettier-ignore */
      .chat-sub { font-size: 10px; color: #2dd4bf; }
      /* prettier-ignore */
      .chat-msg { background: #f0f0f0; padding: 8px 12px; border-radius: 14px 14px 14px 4px; max-width: 85%; font-size: 12px; color: #1e293b; line-height: 1.3; margin-bottom: 8px; }
      /* prettier-ignore */
      .user-msg { background: #2dd4bf; padding: 8px 12px; border-radius: 14px 14px 4px 14px; max-width: 80%; margin-left: auto; font-size: 12px; color: #fff; line-height: 1.3; margin-bottom: 8px; }
      /* prettier-ignore */
      .ai-response { opacity: 0; transform: translateY(30px); }
      /* prettier-ignore */
      .ai-response-bubble { background: #f0f0f0; padding: 8px 12px; border-radius: 14px 14px 14px 4px; max-width: 90%; font-size: 12px; color: #1e293b; line-height: 1.3; margin-bottom: 8px; }
      /* prettier-ignore */
      .ai-caret { display: inline-block; opacity: 0; }
      /* prettier-ignore */
      .view-products-btn { background: #2dd4bf; padding: 8px 16px; border-radius: 16px; text-align: center; font-size: 12px; font-weight: 700; color: white; max-width: 60%; opacity: 0; transform: scale(0); transform-origin: center center; }
      /* prettier-ignore */
      .chat-input { position: absolute; bottom: 12px; left: 12px; right: 12px; background: #f5f5f5; border-radius: 18px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; border: 2px solid transparent; }
      /* prettier-ignore */
      .chat-input-text { color: #999; font-size: 11px; flex: 1; }
      /* prettier-ignore */
      .chat-send { width: 26px; height: 26px; border-radius: 50%; background: #ccc; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; flex-shrink: 0; }
      /* prettier-ignore */
      #products-grid { position: absolute; left: 60px; right: 60px; bottom: 120px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; z-index: 8; }
      /* prettier-ignore */
      .product-card { background: #fff; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.18); overflow: hidden; opacity: 0; transform: translateY(80px); }
      /* prettier-ignore */
      .product-thumb { width: 100%; height: 220px; background: #f6f7f9; display: flex; align-items: center; justify-content: center; }
      /* prettier-ignore */
      .product-thumb img { max-width: 90%; max-height: 90%; object-fit: contain; }
      /* prettier-ignore */
      .product-info { padding: 16px 18px 20px; }
      /* prettier-ignore */
      .product-title { font-size: 20px; font-weight: 700; color: #1e293b; line-height: 1.2; margin-bottom: 6px; }
      /* prettier-ignore */
      .product-rating { font-size: 16px; color: #2dd4bf; font-weight: 600; margin-bottom: 4px; }
      /* prettier-ignore */
      .product-price { font-size: 18px; font-weight: 800; color: #1e293b; }

      /* prettier-ignore */
      #cursor { position: absolute; left: 0; top: 0; width: 200px; height: 200px; transform-origin: 45px 55px; z-index: 100; pointer-events: none; opacity: 0; }
      /* prettier-ignore */
      #cursor dotlottie-player { width: 100%; height: 100%; display: block; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.25)); }
      /* prettier-ignore */
      .ripple { position: absolute; left: 0; top: 0; width: 120px; height: 120px; border-radius: 50%; background: rgba(45, 212, 191, 0.5); transform: translate(-50%, -50%) scale(0); opacity: 0; z-index: 99; pointer-events: none; }
    </style>
  </head>
  <body>
    <div
      id="stage"
      class="clip"
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-track-index="0"
      data-width="1080"
      data-height="1920"
    >
      <audio
        id="sfx-click"
        src="audio/send-click.wav"
        data-start="3.167"
        data-duration="0.5"
        data-volume="0.5"
        preload="auto"
      ></audio>

      <div class="title" id="title">Personalized Results</div>

      <div id="phone-stage">
        <div id="phone-mount"></div>
      </div>

      <!-- Product cards (appear after hand tap) -->
      <div id="products-grid">
        <div class="product-card" id="card-1">
          <div class="product-thumb">
            <img src="public/dorian/woodmart/LG SINGLE TV.png" alt="" />
          </div>
          <div class="product-info">
            <div class="product-title">LG C3 65" OLED</div>
            <div class="product-rating">★ 4.8</div>
            <div class="product-price">$1,899</div>
          </div>
        </div>
        <div class="product-card" id="card-2">
          <div class="product-thumb">
            <img src="public/dorian/woodmart/LG single tv.png" alt="" />
          </div>
          <div class="product-info">
            <div class="product-title">LG G3 55" OLED</div>
            <div class="product-rating">★ 4.7</div>
            <div class="product-price">$1,499</div>
          </div>
        </div>
        <div class="product-card" id="card-3">
          <div class="product-thumb">
            <img src="public/dorian/woodmart/LGS.png" alt="" />
          </div>
          <div class="product-info">
            <div class="product-title">LG QNED 75"</div>
            <div class="product-rating">★ 4.6</div>
            <div class="product-price">$1,299</div>
          </div>
        </div>
      </div>

      <div id="ripple" class="ripple"></div>

      <div id="cursor">
        <dotlottie-player
          src="lottie/cursor-real-black.json"
          autoplay
          speed="0"
        ></dotlottie-player>
      </div>
    </div>

    <template id="phone-content">
      <div style="margin-left: -5px; margin-top: -70px; position: relative">
        <img
          src="public/dorian/woodmart/categories-mobile-2.png"
          style="width: 402px; height: auto; display: block"
          alt=""
        />
        <div
          style="
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #fff;
          "
        ></div>
      </div>
    </template>

    <script>
      const phone = buildDorianPhone({
        mountId: 'phone-mount',
        contentTemplateId: 'phone-content',
        zoom: 1.8,
        showAiBubble: false,
        hideSearch: true,
      });

      // Pre-zoom to continue from scenes 4/5/6
      gsap.set('#phone-stage', { scale: 1.528, y: -374 });

      // Append chat panel with AI greeting + user message + AI response (hidden initially)
      phone.screenEl.insertAdjacentHTML(
        'beforeend',
        `
        <div class="chat-panel">
          <div class="chat-header">
            <div class="chat-avatar"></div>
            <div>
              <div class="chat-name">Dorian</div>
              <div class="chat-sub">Your AI Assistant</div>
            </div>
          </div>
          <div class="chat-msg">Hi! How can I help you today?</div>
          <div class="user-msg">Show me LG TVs with best reviews</div>
          <div class="ai-response" id="ai-response">
            <div class="ai-response-bubble">
              <span id="ai-text"></span><span class="ai-caret" id="ai-caret">|</span>
            </div>
            <div class="view-products-btn" id="view-btn">View Products →</div>
          </div>
          <div class="chat-input">
            <span class="chat-input-text">Type a message...</span>
            <div class="chat-send">→</div>
          </div>
        </div>
      `,
      );

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Title fade in
      tl.to('#title', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 0);

      // f5-f20: AI response container slides up + fades in
      tl.to(
        '#ai-response',
        { opacity: 1, y: 0, duration: 15 / 30, ease: 'back.out(1.4)' },
        5 / 30,
      );

      // f5-f50: Typewriter AI message
      const AI_MSG =
        'I found 6 LG TVs with excellent reviews! The LG C3 65" OLED is the top-rated with 4.8 stars. Here are your options:';
      const aiTextEl = document.getElementById('ai-text');
      const aiCaretEl = document.getElementById('ai-caret');
      tl.to(
        { n: 0 },
        {
          n: AI_MSG.length,
          duration: 45 / 30,
          ease: 'none',
          onUpdate() {
            const n = Math.floor(this.targets()[0].n);
            aiTextEl.textContent = AI_MSG.slice(0, n);
          },
        },
        5 / 30,
      );

      // Caret blink during typewriter (f5-f50)
      tl.to(
        '#ai-caret',
        {
          opacity: 1,
          duration: 0.25,
          repeat: 8,
          yoyo: true,
          ease: 'steps(1)',
        },
        5 / 30,
      );
      // Hide caret when typing done
      tl.to('#ai-caret', { opacity: 0, duration: 0.1 }, 50 / 30);

      // f40-f55: "View Products" button bouncy appear
      tl.to(
        '#view-btn',
        {
          opacity: 1,
          scale: 1,
          duration: 15 / 30,
          ease: 'elastic.out(1, 0.5)',
        },
        40 / 30,
      );

      // Cursor path — appears f70, moves toward View Products button, clicks at f95
      const TIP_X = 45,
        TIP_Y = 55;
      const setC = (x, y) => ({ x: x - TIP_X, y: y - TIP_Y });

      // Starting position — below, to the right of the button
      gsap.set('#cursor', { opacity: 0, rotation: 0, ...setC(650, 1600) });
      tl.to('#cursor', { opacity: 1, duration: 0.1 }, 70 / 30);
      // f70-f85: move up toward button
      tl.to(
        '#cursor',
        { ...setC(560, 1480), duration: 15 / 30, ease: 'power2.out' },
        70 / 30,
      );
      // f85-f95: final approach to button center
      tl.to(
        '#cursor',
        { ...setC(540, 1450), duration: 10 / 30, ease: 'power2.in' },
        85 / 30,
      );

      // f95: Click — button press feedback + ripple + cursor click frame
      tl.call(
        () => {
          const btn = document.getElementById('view-btn');
          if (btn) btn.style.transform = 'scale(0.95)';
          const player = document.querySelector('#cursor dotlottie-player');
          if (player && player.seek) player.seek(35);
        },
        null,
        95 / 30,
      );
      tl.to(
        '#view-btn',
        { scale: 1, duration: 0.15, ease: 'power2.out' },
        98 / 30,
      );
      tl.set(
        '#ripple',
        { x: 540 - 60, y: 1450 - 60, scale: 0, opacity: 1 },
        95 / 30,
      );
      tl.to(
        '#ripple',
        { scale: 1.8, opacity: 0, duration: 0.5, ease: 'power2.out' },
        95 / 30,
      );

      // Cursor fades after tap
      tl.to('#cursor', { opacity: 0, duration: 0.15 }, 102 / 30);

      // f100-f140: Product cards slide up with stagger (from below phone)
      tl.to(
        '.product-card',
        {
          opacity: 1,
          y: 0,
          duration: 30 / 30,
          ease: 'back.out(1.3)',
          stagger: 0.15,
        },
        100 / 30,
      );

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
