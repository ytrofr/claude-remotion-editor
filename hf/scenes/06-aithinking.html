<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dorian — Scene 6 AIThinking (HF Pilot)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="components/dorian-phone.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #fff;
        font-family: 'Rubik', sans-serif;
      }
      #stage {
        width: 1080px;
        height: 1920px;
        background: #fff;
        position: relative;
      }

      .title {
        position: absolute;
        top: 80px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 44px;
        font-weight: 700;
        color: #1e293b;
        z-index: 10;
        opacity: 0;
      }
      #phone-stage {
        position: absolute;
        inset: 0;
        transform-origin: center center;
      }
      #phone-mount {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .chat-panel {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 370px;
        background: #fff;
        border-radius: 24px 24px 0 0;
        box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.12);
        padding: 15px 16px;
        z-index: 10;
      }
      .chat-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .chat-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
      }
      .chat-name {
        font-weight: 700;
        font-size: 14px;
        color: #1e293b;
      }
      .chat-sub {
        font-size: 10px;
        color: #2dd4bf;
      }
      .chat-msg {
        background: #f0f0f0;
        padding: 8px 12px;
        border-radius: 14px 14px 14px 4px;
        max-width: 85%;
        font-size: 12px;
        color: #1e293b;
        line-height: 1.3;
        margin-bottom: 8px;
      }
      .user-msg {
        background: #2dd4bf;
        padding: 8px 12px;
        border-radius: 14px 14px 4px 14px;
        max-width: 80%;
        margin-left: auto;
        font-size: 12px;
        color: #fff;
        line-height: 1.3;
        margin-bottom: 8px;
      }
      .thinking-bubble {
        background: #f0f0f0;
        padding: 10px 16px;
        border-radius: 14px 14px 14px 4px;
        max-width: 60px;
        display: flex;
        gap: 5px;
        align-items: center;
        opacity: 0;
      }
      .thinking-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #999;
        transform: translateY(0);
      }
      .chat-input {
        position: absolute;
        bottom: 12px;
        left: 12px;
        right: 12px;
        background: #f5f5f5;
        border-radius: 18px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 2px solid transparent;
      }
      .chat-input-text {
        color: #999;
        font-size: 11px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chat-send {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 14px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      class="clip"
      data-composition-id="main"
      data-start="0"
      data-duration="3"
      data-track-index="0"
      data-width="1080"
      data-height="1920"
    >
      <div class="title" id="title">AI-Powered Search</div>

      <div id="phone-stage">
        <div id="phone-mount"></div>
      </div>
    </div>

    <template id="phone-content">
      <div style="margin-left: -5px; margin-top: -70px; position: relative">
        <img
          src="public/dorian/woodmart/categories-mobile-2.png"
          style="width: 402px; height: auto; display: block"
          alt=""
        />
        <div
          style="
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #fff;
          "
        ></div>
      </div>
    </template>

    <script>
      const phone = buildDorianPhone({
        mountId: 'phone-mount',
        contentTemplateId: 'phone-content',
        zoom: 1.8,
        showAiBubble: false,
        hideSearch: true,
      });

      // Continue from scene 5 end state — chat panel visible, user message sent
      gsap.set('#phone-stage', { scale: 1.528, y: -374 });

      // Append chat panel carrying the sent user message + empty input
      phone.screenEl.insertAdjacentHTML(
        'beforeend',
        `
        <div class="chat-panel">
          <div class="chat-header">
            <div class="chat-avatar"></div>
            <div>
              <div class="chat-name">Dorian</div>
              <div class="chat-sub">Your AI Assistant</div>
            </div>
          </div>
          <div class="chat-msg">Hi! How can I help you today?</div>
          <div class="user-msg">Show me LG TVs with best reviews</div>
          <div class="thinking-bubble" id="thinking-bubble">
            <div class="thinking-dot" id="dot-0"></div>
            <div class="thinking-dot" id="dot-1"></div>
            <div class="thinking-dot" id="dot-2"></div>
          </div>
          <div class="chat-input">
            <span class="chat-input-text">Type a message...</span>
            <div class="chat-send">→</div>
          </div>
        </div>
      `,
      );

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Title fade in (matches scene 5 convention)
      tl.to('#title', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 0);

      // Thinking bubble fade in at f5 (~0.17s)
      tl.to(
        '#thinking-bubble',
        { opacity: 1, duration: 0.3, ease: 'power2.out' },
        5 / 30,
      );

      // Three thinking dots with staggered bounce
      // Remotion: Math.max(0, Math.sin(frame*0.2 - i*1.2)) * 6 — bounces up to 6px
      // GSAP equivalent: each dot yoyos translateY with i*~0.2s stagger
      const DOT_DURATION = 0.5; // seconds per half-cycle
      const DOT_REPEAT = 5; // 5 repeats * 1 full cycle ≈ 2.5s of bounce
      ['#dot-0', '#dot-1', '#dot-2'].forEach((sel, i) => {
        tl.to(
          sel,
          {
            y: -6,
            duration: DOT_DURATION,
            yoyo: true,
            repeat: DOT_REPEAT,
            ease: 'sine.inOut',
          },
          5 / 30 + i * 0.2,
        );
      });

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
